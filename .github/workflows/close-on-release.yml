name: Auto Close Implemented Issues on Release

on:
  release:
    types: [published]

permissions:
  issues: write
  pull-requests: write

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close Implemented Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # 1. 查找带有 'status: implemented' 标签的所有打开的 Issue
          echo "Searching for issues with 'status: implemented' label..."
          issue_numbers=$(gh issue list --label "status: implemented" --state open --json number --jq '.[].number')

          if [ -z "$issue_numbers" ]; then
            echo "No implemented issues found to close."
            exit 0
          fi

          # 2. 循环关闭并留言
          for issue in $issue_numbers; do
            echo "Closing issue #$issue..."
            gh issue comment $issue --body "🚀 This issue has been released in version $RELEASE_TAG. Closing now."
            gh issue close $issue
          done

          echo "Successfully closed all implemented issues."
