name: Update Version JSON

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  deploy-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version.json with Changelog
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION=${TAG_NAME#v}
          DATE=$(date +'%Y-%m-%d')
          
          mkdir -p public
          
          # 1. Get all assets in JSON
          ASSETS=$(gh release view "$TAG_NAME" --json assets -q '.assets')
          
          # 2. Identify ARM64 portable asset (.zip only, exclude installer .exe)
          URL_ARM64=$(echo "$ASSETS" | jq -r 'map(select(.name | ascii_downcase | (contains("arm64") and test("\\.zip$")))) | .[0].url // ""')
          NAME_ARM64=$(echo "$ASSETS" | jq -r 'map(select(.name | ascii_downcase | (contains("arm64") and test("\\.zip$")))) | .[0].name // ""')
          
          # 3. Identify X64 portable asset (.zip only, exclude installer .exe)
          URL_X64=$(echo "$ASSETS" | jq -r 'map(select(.name | ascii_downcase | ((contains("x64") or contains("amd64")) and test("\\.zip$")))) | .[0].url // ""')
          NAME_X64=$(echo "$ASSETS" | jq -r 'map(select(.name | ascii_downcase | ((contains("x64") or contains("amd64")) and test("\\.zip$")))) | .[0].name // ""')
          
          # Fallback: if no explicit x64 .zip found, take the first .zip that isn't ARM64
          if [ -z "$URL_X64" ]; then
             URL_X64=$(echo "$ASSETS" | jq -r 'map(select((.name | ascii_downcase | contains("arm64") | not) and (.name | ascii_downcase | test("\\.zip$")))) | .[0].url // ""')
             NAME_X64=$(echo "$ASSETS" | jq -r 'map(select((.name | ascii_downcase | contains("arm64") | not) and (.name | ascii_downcase | test("\\.zip$")))) | .[0].name // ""')
          fi
          
          SHA_X64=""
          SHA_ARM64=""
          
          # Download and Hash X64
          if [ -n "$NAME_X64" ]; then
             gh release download "$TAG_NAME" -p "$NAME_X64" -O x64_pkg
             SHA_X64=$(sha256sum x64_pkg | awk '{print $1}')
          fi
          
          # Download and Hash ARM64
          if [ -n "$NAME_ARM64" ]; then
             gh release download "$TAG_NAME" -p "$NAME_ARM64" -O arm64_pkg
             SHA_ARM64=$(sha256sum arm64_pkg | awk '{print $1}')
          fi
          
          # Fallback URL for legacy clients (pointing to X64)
          URL=$URL_X64
          
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          
          JSON_DATA=$(jq -n \
            --arg v "$VERSION" \
            --arg u "$URL" \
            --arg u_x64 "$URL_X64" \
            --arg u_arm "$URL_ARM64" \
            --arg sha_x64 "$SHA_X64" \
            --arg sha_arm "$SHA_ARM64" \
            --arg d "$DATE" \
            --arg c "$RELEASE_BODY" \
            '{version: $v, url: $u, url_x64: $u_x64, url_arm64: $u_arm, sha256_x64: $sha_x64, sha256_arm64: $sha_arm, date: $d, changelog: $c}')
          
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "$JSON_DATA" > public/version-prerelease.json
            echo "=== Generated Pre-release JSON Content ==="
            cat public/version-prerelease.json
          else
            echo "$JSON_DATA" > public/version.json
            echo "$JSON_DATA" > public/version-prerelease.json
            echo "=== Generated Stable JSON Content ==="
            cat public/version.json
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: false 
          keep_files: true
          publish_branch: gh-pages
          commit_message: "Auto-update version.json to ${{ github.event.release.tag_name }}"